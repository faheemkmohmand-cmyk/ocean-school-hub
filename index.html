<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Primary title — React Helmet overrides this per-route after JS loads -->
    <title>GHS Babi Khel - Government High School</title>

    <!-- Static OG fallbacks for social bots and non-JS crawlers (React Helmet overrides at runtime) -->
    <meta name="description" content="Government High School Babi Khel, District Mohmand, KPK Pakistan. Quality education, notices, news, results, online classes, library and admissions." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ghsbabikhel.indevs.in/" />
    <meta property="og:title" content="GHS Babi Khel — Government High School, District Mohmand KPK" />
    <meta property="og:description" content="Official website of Government High School Babi Khel — notices, results, online classes, admissions and more." />
    <meta property="og:image" content="https://ghsbabikhel.indevs.in/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="GHS Babi Khel" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GHS Babi Khel — Government High School" />
    <meta name="twitter:description" content="Official website of Government High School Babi Khel, District Mohmand KPK Pakistan." />
    <meta name="twitter:image" content="https://ghsbabikhel.indevs.in/og-image.jpg" />
    <link rel="canonical" href="https://ghsbabikhel.indevs.in/" />

    <!-- Google Search Console ownership verification -->
    <meta name="google-site-verification" content="oxtaDh5_WKTGGtiPsV1j8KLLqg8b64a8r2F825a7JPQ" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#1e2a53" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!--
      NOTE: description, keywords, robots, canonical, hreflang, OG, Twitter card,
      and JSON-LD are ALL injected by React Helmet (SEO.tsx + SiteSchema.tsx).
      Keeping them here too causes duplicate tags that confuse Google and hurt rankings.
      React Helmet is the single source of truth for all meta tags.
    -->

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://supabase.co" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />

    <!-- Fonts are loaded via @import in src/index.css with display=swap -->


    <!-- Inline critical CSS -->
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        background: hsl(210, 40%, 98%);
      }
      #root { min-height: 100vh; }
    </style>

    <!-- Theme bootstrap — prevents flash of wrong theme -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('ghs-theme');
          var root = document.documentElement;
          ['dark','theme-midnight','theme-forest','theme-violet'].forEach(function(c){ root.classList.remove(c); });
          if (t === 'dark' || t === 'midnight' || t === 'forest' || t === 'violet') {
            root.classList.add(t === 'dark' ? 'dark' : 'theme-' + t);
          } else if (t === 'light') {
            // no class
          } else {
            var manual = localStorage.getItem('ghs-dark-mode-manual');
            var saved  = localStorage.getItem('ghs-dark-mode');
            var isDark;
            if (manual !== null) isDark = JSON.parse(manual);
            else if (saved  !== null) isDark = JSON.parse(saved);
            else {
              var h = new Date(Date.now() + 5*3600*1000).getUTCHours();
              isDark = h >= 18 || h < 6;
            }
            if (isDark) root.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>

    <!-- Smart SW cleanup: only unregister broken/outdated service workers -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(r) { r.unregister(); });
        });
      }
      if (window.caches && !sessionStorage.getItem('cache-cleared-v2')) {
        caches.keys().then(function(names) {
          names.forEach(function(name) { caches.delete(name); });
        });
        sessionStorage.setItem('cache-cleared-v2', '1');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
